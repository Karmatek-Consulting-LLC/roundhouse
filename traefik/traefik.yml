api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    # Talks to docker-socket-proxy-traefik (tecnativa/docker-socket-proxy) over
    # the mcp-network instead of the raw /var/run/docker.sock.
    endpoint: "tcp://docker-socket-proxy-traefik:2375"
    exposedByDefault: false
    network: mcp-network
  file:
    directory: /etc/traefik/dynamic
    watch: true
