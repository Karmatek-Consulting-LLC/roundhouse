# Local dev Traefik config (used by docker-compose.dev.yml). Plain HTTP only; the
# published/Swarm Traefik is configured via CLI flags in docker-stack.yml and
# docker-compose.yml (different provider, different entrypoint set).
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    # Direct socket. The prod stack uses tecnativa/docker-socket-proxy in front
    # of this for blast-radius reasons; locally we have full socket trust.
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mcp-network
