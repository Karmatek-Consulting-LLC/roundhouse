# Local dev Traefik config. Plain HTTP only; for the prod/swarm config see
# traefik.swarm.yml (different provider, different entrypoint set).
api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

providers:
  docker:
    # Direct socket. The prod stack uses tecnativa/docker-socket-proxy in front
    # of this for blast-radius reasons; locally we have full socket trust.
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mcp-network
  file:
    # Written to by the platform-api when it deploys a server; routes per-server
    # /s/{name} prefixes onto the spawned container.
    directory: /etc/traefik/dynamic
    watch: true
