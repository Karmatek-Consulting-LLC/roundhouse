api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

providers:
  swarm:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # Must match `docker network ls`: {stack}_mcp-network (stack = `docker stack deploy` name).
    network: mcp-platform_mcp-network
  file:
    directory: /etc/traefik/dynamic
    watch: true
