api:
  dashboard: true
  insecure: true

entryPoints:
  web:
    address: ":80"

providers:
  swarm:
    # Talks to docker-socket-proxy-traefik (tecnativa/docker-socket-proxy) over
    # the roundhouse-network instead of the raw /var/run/docker.sock. The proxy only
    # exposes CONTAINERS/NETWORKS/SERVICES/TASKS endpoints to Traefik.
    endpoint: "tcp://docker-socket-proxy-traefik:2375"
    exposedByDefault: false
    # Must match `docker network ls`: {stack}_roundhouse-network (stack = `docker stack deploy` name).
    network: roundhouse_roundhouse-network
  file:
    directory: /etc/traefik/dynamic
    watch: true
