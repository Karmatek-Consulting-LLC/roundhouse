# Docker Swarm stack for Roundhouse. The platform-api image is published to GHCR
# by .github/workflows/build-image.yml, so a deployment needs only this file plus
# a small site overlay for your ingress/topology — no repo clone, no local build.
#
# Required external secrets (one-time create on the Swarm):
#   docker secret create roundhouse_app_key <file>           # APP_KEY, "base64:<32-byte-key>"
#   docker secret create roundhouse_admin_email <file>       # optional - seeded on first boot
#   docker secret create roundhouse_admin_password <file>    # optional - seeded on first boot
#   docker secret create roundhouse_postgres_password <file>
#
# This base stack is environment-agnostic: it does NOT attach to an external
# ingress network or pin services to particular nodes. Layer those on with a
# site overlay at deploy time (see docker-stack.override.example.yml):
#   docker stack deploy -c docker-stack.yml -c docker-stack.override.yml roundhouse
#
# The embedded Traefik only listens on :80 (entrypoint `web`); it does not
# terminate TLS or use Let's Encrypt. In a fronted deployment an upstream
# ingress terminates TLS (websecure) and forwards HTTP to this stack's
# traefik:80 (e.g. mcp-traefik-svc -> http://roundhouse_traefik:80) over a
# shared external network the overlay attaches. Backends stay on roundhouse-network.
#   Stack name is fixed at `roundhouse` (traefik's --providers.swarm.network flag pins roundhouse_roundhouse-network).
#   Set PUBLIC_HOSTNAME in the deploy env to the host clients reach the SPA at
#   - must match the ingress Host() rule that fronts this stack.
# v3.6+ required - older Traefik's Docker API negotiation is rejected by modern Engines.

services:
  # Read-only docker API for Traefik (discovery only - no POST, no BUILD).
  # Must run on a manager so /var/run/docker.sock exposes the Swarm API.
  docker-socket-proxy-traefik:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      # SWARM: required for Traefik providers.swarm (GET /v…/swarm); denied by default in the proxy.
      SWARM: 1
      NODES: 1
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - roundhouse-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Scoped docker API for platform-api - needs POST + BUILD for container/service
  # CRUD and image builds. Still much smaller attack surface than a raw socket mount.
  docker-socket-proxy-api:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      INFO: 1
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NODES: 1
      NETWORKS: 1
      IMAGES: 1
      BUILD: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - roundhouse-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  traefik:
    image: traefik:v3.6
    # Static config as CLI flags (equivalent to a traefik.yml) so this stack stays
    # a single self-contained file — no config object, no external file to ship.
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entryPoints.web.address=:80
      # Discovery via docker-socket-proxy-traefik over roundhouse-network, not the
      # raw socket. exposedByDefault=false -> only services with traefik.enable=true.
      - --providers.swarm.endpoint=tcp://docker-socket-proxy-traefik:2375
      - --providers.swarm.exposedByDefault=false
      # Must match `docker network ls`: {stack}_roundhouse-network.
      - --providers.swarm.network=roundhouse_roundhouse-network
      # Dynamic config (routers/services written at runtime) watched from this dir.
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
    volumes:
      - traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - roundhouse-network
    depends_on:
      - docker-socket-proxy-traefik
    deploy:
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_DB: mcp
      POSTGRES_PASSWORD_FILE: /run/secrets/roundhouse_postgres_password
    secrets:
      - roundhouse_postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - roundhouse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure

  platform-api:
    image: ghcr.io/karmatek-consulting-llc/roundhouse:latest
    secrets:
      - roundhouse_app_key
      - roundhouse_admin_email
      - roundhouse_admin_password
      - roundhouse_postgres_password
    volumes:
      - server-data:/var/lib/roundhouse/servers
      - traefik-dynamic:/var/lib/roundhouse/traefik-dynamic
    environment:
      # Secret files - entrypoint hydrates APP_KEY / ADMIN_* / DB_PASSWORD from these.
      - APP_KEY_FILE=/run/secrets/roundhouse_app_key
      - ADMIN_EMAIL_FILE=/run/secrets/roundhouse_admin_email
      - ADMIN_PASSWORD_FILE=/run/secrets/roundhouse_admin_password
      - DB_PASSWORD_FILE=/run/secrets/roundhouse_postgres_password

      # Reach the Docker API via the scoped socket-proxy, not a raw socket mount.
      - MCP_DOCKER_HOST=tcp://docker-socket-proxy-api:2375
      # Public URL clients reach the SPA at - must match the fronting Host() rule.
      - MCP_BASE_URL=https://${PUBLIC_HOSTNAME}
    networks:
      - roundhouse-network
    # Give the SIGTERM trap time to tear down every spawned MCP server before SIGKILL.
    stop_grace_period: 60s
    deploy:
      labels:
        - "traefik.enable=true"
        # Traefik v3 Swarm provider uses traefik.swarm.network (not traefik.docker.network).
        - "traefik.swarm.network=roundhouse_roundhouse-network"
        # Plain HTTP only — TLS is at cluster ingress. !PathPrefix(`/s/`) leaves /s/{server} to MCP services.
        - "traefik.http.routers.platform-api.entrypoints=web"
        - "traefik.http.routers.platform-api.rule=Host(`${PUBLIC_HOSTNAME}`) && !PathPrefix(`/s/`)"
        - "traefik.http.services.platform-api.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure

secrets:
  roundhouse_app_key:
    external: true
  roundhouse_admin_email:
    external: true
  roundhouse_admin_password:
    external: true
  roundhouse_postgres_password:
    external: true

networks:
  roundhouse-network:
    driver: overlay
    attachable: true

volumes:
  pgdata:
  server-data:
  traefik-dynamic:
