version: "3.8"

# Docker Swarm stack for the lab. Consumed by the lab CI workflow after it
# builds and pushes the image from api/Dockerfile.
#
# Required external secrets (one-time create on the Swarm):
#   docker secret create mcp_app_key <file>           # APP_KEY, "base64:<32-byte-key>"
#   docker secret create mcp_admin_email <file>       # optional - seeded on first boot
#   docker secret create mcp_admin_password <file>    # optional - seeded on first boot
#   docker secret create mcp_postgres_password <file>
#
# Traefik is on an external ingress network so cluster ingress Traefik can reach it.
# Ingress terminates TLS (websecure) and forwards HTTP to this stack's traefik:80
# (e.g. mcp-traefik-svc -> http://roundhouse_traefik:80). This embedded Traefik
# only listens on :80 (entrypoint `web`); it does not terminate TLS or use Let's Encrypt.
# Backends stay on roundhouse-network. The external ingress overlay is fixed in `networks` (traefik-public).
#   Stack name is fixed at `roundhouse` (see workflow + traefik.swarm.yml network name).
#   Set PUBLIC_HOSTNAME in the deploy env to the host clients reach the SPA at
#   - must match the cluster ingress Host() rule that fronts this stack.
# v3.6+ required - older Traefik's Docker API negotiation is rejected by modern Engines.

services:
  # Read-only docker API for Traefik (discovery only - no POST, no BUILD).
  # Must run on a manager so /var/run/docker.sock exposes the Swarm API.
  docker-socket-proxy-traefik:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      # SWARM: required for Traefik providers.swarm (GET /v…/swarm); denied by default in the proxy.
      SWARM: 1
      NODES: 1
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 1
      TASKS: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - roundhouse-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Scoped docker API for platform-api - needs POST + BUILD for container/service
  # CRUD and image builds. Still much smaller attack surface than a raw socket mount.
  docker-socket-proxy-api:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      INFO: 1
      CONTAINERS: 1
      SERVICES: 1
      TASKS: 1
      NODES: 1
      NETWORKS: 1
      IMAGES: 1
      BUILD: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - roundhouse-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  traefik:
    image: traefik:v3.6
    volumes:
      - traefik-dynamic:/etc/traefik/dynamic:ro
    configs:
      - source: traefik-config
        target: /etc/traefik/traefik.yml
    networks:
      - roundhouse-network
      - traefik_traefik-public
    depends_on:
      - docker-socket-proxy-traefik
    deploy:
      placement:
        constraints:
          - node.labels.db == true
      restart_policy:
        condition: on-failure

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_DB: mcp
      POSTGRES_PASSWORD_FILE: /run/secrets/mcp_postgres_password
    secrets:
      - mcp_postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - roundhouse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      placement:
        constraints:
          - node.labels.db == true
      restart_policy:
        condition: on-failure

  platform-api:
    image: ${IMAGE_REPO}:latest
    secrets:
      - mcp_app_key
      - mcp_admin_email
      - mcp_admin_password
      - mcp_postgres_password
    volumes:
      - server-data:/var/lib/roundhouse/servers
      - traefik-dynamic:/var/lib/roundhouse/traefik-dynamic
    environment:
      - PYTHONUNBUFFERED=1

      # Secret files - entrypoint hydrates APP_KEY / ADMIN_* / DB_PASSWORD from these.
      - APP_KEY_FILE=/run/secrets/mcp_app_key
      - ADMIN_EMAIL_FILE=/run/secrets/mcp_admin_email
      - ADMIN_PASSWORD_FILE=/run/secrets/mcp_admin_password
      - DB_PASSWORD_FILE=/run/secrets/mcp_postgres_password

      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=mcp
      - DB_USERNAME=mcp

      - AUTH_TOKEN_EXPIRATION_MINUTES=1440

      # Must match `docker network ls` overlay: {stack}_roundhouse-network.
      - MCP_DOCKER_NETWORK=roundhouse_roundhouse-network
      - MCP_DOCKER_HOST=tcp://docker-socket-proxy-api:2375
      - MCP_TRAEFIK_ENTRYPOINTS=web
      - MCP_BASE_URL=https://${PUBLIC_HOSTNAME}
      - MCP_SERVERS_DATA_DIR=/var/lib/roundhouse/servers
      - MCP_TEMPLATES_DIR=/app/templates
      - MCP_TRAEFIK_DYNAMIC_DIR=/var/lib/roundhouse/traefik-dynamic
      - MCP_DEFAULT_SERVER_REPLICAS=1
      - MCP_MAX_SERVER_REPLICAS=4
    networks:
      - roundhouse-network
    # Give the SIGTERM trap time to tear down every spawned MCP server before SIGKILL.
    stop_grace_period: 60s
    deploy:
      placement:
        constraints:
          - node.labels.db == true
      labels:
        - "traefik.enable=true"
        # Traefik v3 Swarm provider uses traefik.swarm.network (not traefik.docker.network).
        - "traefik.swarm.network=roundhouse_roundhouse-network"
        # Plain HTTP only — TLS is at cluster ingress. !PathPrefix(`/s/`) leaves /s/{server} to MCP services.
        - "traefik.http.routers.platform-api.entrypoints=web"
        - "traefik.http.routers.platform-api.rule=Host(`${PUBLIC_HOSTNAME}`) && !PathPrefix(`/s/`)"
        - "traefik.http.services.platform-api.loadbalancer.server.port=8000"
      restart_policy:
        condition: on-failure

secrets:
  mcp_app_key:
    external: true
  mcp_admin_email:
    external: true
  mcp_admin_password:
    external: true
  mcp_postgres_password:
    external: true

configs:
  traefik-config:
    # Swarm configs cannot be updated in place; change the name (e.g. v4) when
    # editing traefik/traefik.swarm.yml, then `docker config rm` the old one if unused.
    name: roundhouse_traefik-static-v4
    file: ./traefik/traefik.swarm.yml

networks:
  roundhouse-network:
    driver: overlay
    attachable: true
  traefik_traefik-public:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik_traefik-public}

volumes:
  pgdata:
  server-data:
  traefik-dynamic:
