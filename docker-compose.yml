services:
  traefik:
    image: traefik:v3.3
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/etc/traefik/certs:ro
    networks:
      - mcp-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${POSTGRES_DB:-mcp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  platform-api:
    build: ./platform
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./templates:/app/templates:ro
      - ./data/servers:/app/data/servers
      - traefik-dynamic:/app/traefik/dynamic
      - traefik-certs:/app/traefik/certs
    environment:
      - DOCKER_NETWORK=${DOCKER_NETWORK:-mcp-network}
      - MCP_BASE_URL=${MCP_BASE_URL:-http://localhost:3080}
      - SERVERS_DATA_DIR=/app/data/servers
      - TEMPLATES_DIR=/app/templates
      - DATABASE_URL=${DATABASE_URL:-postgresql://mcp:mcp@postgres:5432/mcp}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mcp.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - TRAEFIK_DYNAMIC_DIR=/app/traefik/dynamic
      - TRAEFIK_CERTS_DIR=/app/traefik/certs
      - DEFAULT_MCP_SERVER_REPLICAS=${DEFAULT_MCP_SERVER_REPLICAS:-1}
      - MAX_MCP_SERVER_REPLICAS=${MAX_MCP_SERVER_REPLICAS:-32}
    networks:
      - mcp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-api.entrypoints=web,websecure"
      - "traefik.http.routers.platform-api.rule=PathPrefix(`/api`)"
      - "traefik.http.services.platform-api.loadbalancer.server.port=9000"

  frontend:
    build: ./frontend
    environment:
      - CI=true
      - API_PROXY_TARGET=http://platform-api:9000
    volumes:
      # Bind-mount the whole tree (avoids macOS Docker file-vs-directory mount bugs on single files).
      # Keep node_modules in a volume so Linux deps match the container, not the host OS.
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      # pnpm store on a Linux volume (see frontend/docker-entrypoint.sh); avoids EPERM on macOS Docker.
      - frontend_pnpm_store:/var/cache/pnpm-store
    networks:
      - mcp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.entrypoints=web,websecure"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

networks:
  mcp-network:
    name: mcp-network
    driver: bridge

volumes:
  pgdata:
  traefik-dynamic:
  traefik-certs:
  frontend_node_modules:
  frontend_pnpm_store:
