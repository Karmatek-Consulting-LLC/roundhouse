# Run Roundhouse on a single host. Pulls the published image — no clone, no
# build. Download just this file and `docker compose up -d`.
#
#   curl -O https://raw.githubusercontent.com/Karmatek-Consulting-LLC/roundhouse/main/docker-compose.yml
#   docker compose up -d
#   # open http://localhost:3080  (admin@mcp.local / admin)
#
# Multi-node? See docker-stack.yml (Swarm). Hacking on Roundhouse itself? See
# docker-compose.dev.yml (builds from source, hot reload).

# Pinned project + volume names so existing installs keep their data across a
# folder rename or an upgrade from the old build-based compose file.
name: roundhouse

services:
  traefik:
    image: traefik:v3.6
    # Static config as CLI flags (equivalent to a traefik.yml) so this file is
    # self-contained — nothing to mount from a repo.
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entryPoints.web.address=:80
      # Local single-host: read the Docker socket directly (full trust). The
      # Swarm stack fronts this with scoped docker-socket-proxy sidecars instead.
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=roundhouse-network
    ports:
      - "${HTTP_PORT:-3080}:80"
      - "${DASHBOARD_PORT:-3081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - roundhouse-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${POSTGRES_DB:-mcp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - roundhouse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  platform-api:
    image: ghcr.io/karmatek-consulting-llc/roundhouse:latest
    depends_on:
      postgres:
        condition: service_healthy
    # Give the SIGTERM trap time to clean up every spawned MCP server before SIGKILL.
    stop_grace_period: 60s
    volumes:
      # platform-api spawns and tears down MCP server containers on this daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      - server-data:/var/lib/roundhouse/servers
    environment:
      - PYTHONUNBUFFERED=1
      # APP_KEY (base64:<32-byte-key>) keys the at-rest encryption for
      # server_tokens rows. Leave blank for a quick start (tokens stored plaintext);
      # set it for anything real.
      - APP_KEY=${APP_KEY:-}

      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${POSTGRES_DB:-mcp}
      - DB_USERNAME=${POSTGRES_USER:-mcp}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-mcp}

      - AUTH_TOKEN_EXPIRATION_MINUTES=1440

      # First-boot admin. Change these before first start, or from the Users page after.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mcp.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}

      - MCP_BASE_URL=${MCP_BASE_URL:-http://localhost:3080}
      - MCP_DOCKER_NETWORK=roundhouse-network
      - MCP_DOCKER_SOCKET=/var/run/docker.sock
      - MCP_DOCKER_MODE=${MCP_DOCKER_MODE:-auto}
      - MCP_SERVERS_DATA_DIR=/var/lib/roundhouse/servers
      - MCP_TEMPLATES_DIR=/app/templates
      - MCP_DEFAULT_SERVER_REPLICAS=${DEFAULT_MCP_SERVER_REPLICAS:-1}
      - MCP_MAX_SERVER_REPLICAS=${MAX_MCP_SERVER_REPLICAS:-32}
    networks:
      - roundhouse-network
    labels:
      # platform-api serves both the API and the bundled SPA on :8000. Catch-all
      # at low priority; the per-server /s/{name} routes are more specific and win.
      - "traefik.enable=true"
      - "traefik.http.routers.platform-api.entrypoints=web"
      - "traefik.http.routers.platform-api.rule=PathPrefix(`/`)"
      - "traefik.http.routers.platform-api.priority=1"
      - "traefik.http.services.platform-api.loadbalancer.server.port=8000"

networks:
  roundhouse-network:
    name: roundhouse-network
    driver: bridge

volumes:
  # Pinned to the legacy `mcp-platform_*` names so an upgrade from the old
  # build-based compose file keeps existing database + spec data.
  pgdata:
    name: mcp-platform_pgdata
  server-data:
    name: mcp-platform_server-data
