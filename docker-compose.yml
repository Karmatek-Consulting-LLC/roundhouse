services:
  traefik:
    image: traefik:v3.3
    ports:
      - "3080:80"
      - "3081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - mcp-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mcp}
      POSTGRES_DB: ${POSTGRES_DB:-mcp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp"]
      interval: 5s
      timeout: 3s
      retries: 5

  platform-api:
    build: ./platform
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./templates:/app/templates:ro
      - ./data/servers:/app/data/servers
    environment:
      - DOCKER_NETWORK=${DOCKER_NETWORK:-mcp-network}
      - MCP_BASE_URL=${MCP_BASE_URL:-http://localhost:3080}
      - SERVERS_DATA_DIR=/app/data/servers
      - TEMPLATES_DIR=/app/templates
      - DATABASE_URL=${DATABASE_URL:-postgresql://mcp:mcp@postgres:5432/mcp}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@mcp.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    networks:
      - mcp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.platform-api.entrypoints=web"
      - "traefik.http.routers.platform-api.rule=PathPrefix(`/api`)"
      - "traefik.http.services.platform-api.loadbalancer.server.port=9000"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/package.json:/app/package.json
      - ./frontend/pnpm-lock.yaml:/app/pnpm-lock.yaml
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/components.json:/app/components.json
    networks:
      - mcp-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"

networks:
  mcp-network:
    name: mcp-network
    driver: bridge

volumes:
  pgdata:
