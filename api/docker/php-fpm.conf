[global]
error_log = /dev/stderr
log_level = notice
daemonize = no

[www]
user = www-data
group = www-data
listen = 127.0.0.1:9001
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8

access.log = /dev/stdout
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
