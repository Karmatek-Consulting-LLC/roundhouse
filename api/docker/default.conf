server {
    listen 9000 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # /api/* — Laravel handles these through index.php
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # /up — Laravel health probe
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    # Built React SPA lives at /var/www/html/public/frontend (copied in the Dockerfile
    # from the frontend-build stage). Serve its static assets with fallback to index.html
    # so client-side routes resolve.
    location / {
        root /var/www/html/public/frontend;
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9001;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_read_timeout 600;
    }

    location ~ /\.ht { deny all; }
}
