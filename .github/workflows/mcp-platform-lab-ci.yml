# MCP Platform Lab CI/CD
#
# Full build -> smoke -> push -> swarm deploy. Works identically on github.com and
# GitHub Enterprise; only the registry host and runner location differ.
#
# Repo/org configuration:
#   Deploy stack name is fixed: mcp-platform (must match docker-stack-lab.yml / traefik.swarm.yml network prefix).
#   Registry image path is built from the `lab` environment vars:
#     REGISTRY_HOST       (required) - used for docker login, e.g. registry.example.com
#     REGISTRY_NAMESPACE  (optional) - project/org segment, e.g. mcp-platform-stack.
#                                      Leave unset for flat registries with no namespace.
#   The "Compute image repo" step combines them into IMAGE_REPO and exports it via
#   $GITHUB_ENV. docker stack deploy then interpolates ${IMAGE_REPO} into
#   docker-stack-lab.yml's platform-api `image:` field.
#
# Postgres pins to a node via `node.labels.db == true`. Label the target node
# once: `docker node update --label-add db=true <hostname>`.
#   Environments:
#     lab  -> Secrets: REGISTRY_USERNAME, REGISTRY_PASSWORD (only if the
#             registry requires auth; otherwise leave them unset and the
#             login step skips cleanly)
#
# Self-hosted runner requirements:
#   Labels: self-hosted, swarm  (matches the labels the karmatek-services workflows use)
#   Host:   a Swarm manager with Docker socket access to run `docker stack deploy`.
#
# Swarm prerequisites (one-time):
#   - External secrets: mcp_app_key, mcp_admin_email, mcp_admin_password, mcp_postgres_password
#   - External overlay traefik_traefik-public (see docker-stack-lab.yml networks.traefik_edge)

name: MCP Platform Lab CI

on:
  push:
    branches: [lab]
    paths:
      - "api/**"
      - "frontend/**"
      - "templates/**"
      - "traefik/**"
      - "docker-stack-lab.yml"
      - ".github/workflows/mcp-platform-lab-ci.yml"
  pull_request:
    branches: [lab]
    paths:
      - "api/**"
      - "frontend/**"
      - "templates/**"
      - "traefik/**"
      - "docker-stack-lab.yml"
      - ".github/workflows/mcp-platform-lab-ci.yml"
  workflow_dispatch: {}

concurrency:
  group: mcp-platform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-smoke-push-deploy:
    name: Build, smoke test, push, deploy
    # Skip untrusted fork PRs (need Docker access).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, swarm]
    environment: lab
    env:
      PLATFORM: linux/amd64
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image repo
        run: |
          set -euo pipefail
          : "${REGISTRY_HOST:?REGISTRY_HOST not set on the lab environment}"
          # REGISTRY_NAMESPACE is optional - flat registries (no project segment) leave it unset.
          if [[ -n "${REGISTRY_NAMESPACE:-}" ]]; then
            IMAGE_REPO="${REGISTRY_HOST}/${REGISTRY_NAMESPACE}/mcp-platform"
          else
            IMAGE_REPO="${REGISTRY_HOST}/mcp-platform"
          fi
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "$GITHUB_ENV"
          echo "Using image repo: ${IMAGE_REPO}"

      - name: Build image
        run: |
          set -euo pipefail
          LAB_SHA_TAG="lab-${GITHUB_SHA}"
          docker buildx build \
            --load \
            --platform "$PLATFORM" \
            -f api/Dockerfile \
            -t "mcp-platform-ci:${LAB_SHA_TAG}" \
            -t "${IMAGE_REPO}:${LAB_SHA_TAG}" \
            .

      - name: Smoke test (platform + ephemeral Postgres)
        run: |
          set -euo pipefail
          NET="mcp-platform-smoke-net-${GITHUB_RUN_ID}"
          DB="mcp-platform-smoke-db-${GITHUB_RUN_ID}"
          APP="mcp-platform-smoke-app-${GITHUB_RUN_ID}"
          LAB_SHA_TAG="lab-${GITHUB_SHA}"
          docker network create "$NET"
          trap 'docker rm -f "$APP" "$DB" >/dev/null 2>&1 || true; docker network rm "$NET" >/dev/null 2>&1 || true' EXIT

          docker run -d --name "$DB" --network "$NET" \
            -e POSTGRES_USER=mcp \
            -e POSTGRES_PASSWORD=mcp \
            -e POSTGRES_DB=mcp \
            postgres:16-alpine >/dev/null

          # Wait for Postgres process inside the DB container.
          for i in $(seq 1 60); do
            if docker exec "$DB" pg_isready -U mcp >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Verify DB is reachable from the same network the app will use.
          for i in $(seq 1 60); do
            if docker run --rm --network "$NET" postgres:16-alpine \
              pg_isready -h "$DB" -U mcp >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Laravel app - startup runs migrations, seeds the admin user, warms caches.
          docker run -d --name "$APP" --network "$NET" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -e APP_KEY=base64:$(openssl rand -base64 32) \
            -e APP_ENV=production \
            -e APP_DEBUG=false \
            -e LOG_CHANNEL=stderr \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST="$DB" \
            -e DB_PORT=5432 \
            -e DB_DATABASE=mcp \
            -e DB_USERNAME=mcp \
            -e DB_PASSWORD=mcp \
            -e ADMIN_EMAIL=ci-admin@example.local \
            -e ADMIN_PASSWORD=ci-admin-password \
            -e MCP_BASE_URL=http://localhost \
            "mcp-platform-ci:${LAB_SHA_TAG}" >/dev/null

          # Health probe via /api/health - Octane serves on :8000.
          for i in $(seq 1 120); do
            RUNNING="$(docker inspect -f '{{.State.Running}}' "$APP" 2>/dev/null || echo false)"
            if [[ "$RUNNING" != "true" ]]; then
              EXIT_CODE="$(docker inspect -f '{{.State.ExitCode}}' "$APP" 2>/dev/null || echo unknown)"
              echo "::error::MCP Platform container exited before health check passed (exit=${EXIT_CODE})."
              docker logs "$APP" 2>&1 || true
              exit 1
            fi
            if docker run --rm --network "$NET" curlimages/curl:latest \
              -fsS "http://${APP}:8000/api/health" >/dev/null 2>&1; then
              echo "Smoke OK (/api/health)"
              exit 0
            fi
            sleep 1
          done

          echo "::error::MCP Platform did not become healthy on /api/health"
          docker logs "$APP" 2>&1 || true
          exit 1

      - name: Log in to registry
        if: github.event_name != 'pull_request'
        env:
          REGISTRY_USER: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASS: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -n "${REGISTRY_USER:-}" && -n "${REGISTRY_PASS:-}" ]]; then
            echo "$REGISTRY_PASS" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
          elif [[ -z "${REGISTRY_USER:-}" && -z "${REGISTRY_PASS:-}" ]]; then
            echo "No REGISTRY_USERNAME/PASSWORD set - assuming unauthenticated registry at ${REGISTRY_HOST}."
          else
            echo "::error::Only one of REGISTRY_USERNAME/REGISTRY_PASSWORD is set. Provide both, or neither."
            exit 1
          fi

      - name: Push image (immutable tag)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          LAB_SHA_TAG="lab-${GITHUB_SHA}"
          docker push "${IMAGE_REPO}:${LAB_SHA_TAG}"

      - name: Tag and push lab-latest
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          LAB_SHA_TAG="lab-${GITHUB_SHA}"
          docker tag \
            "${IMAGE_REPO}:${LAB_SHA_TAG}" \
            "${IMAGE_REPO}:lab-latest"
          docker push "${IMAGE_REPO}:lab-latest"

      - name: Deploy stack
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          docker info --format '{{.Swarm.LocalNodeState}} {{.Swarm.ControlAvailable}}'
          # IMAGE_REPO (from $GITHUB_ENV) is interpolated into docker-stack-lab.yml's
          # platform-api image: field by docker stack deploy.
          docker stack deploy \
            --with-registry-auth \
            --resolve-image always \
            -c docker-stack-lab.yml \
            mcp-platform
