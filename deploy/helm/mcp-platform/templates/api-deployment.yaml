apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-platform.api.fullname" . }}
  labels:
    {{- include "mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "mcp-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "mcp-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        ## Restart pods when config/secret change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "mcp-platform.api.fullname" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "mcp-platform.api.image" . }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "mcp-platform.fullname" . }}
            - secretRef:
                name: {{ include "mcp-platform.fullname" . }}
            {{- with .Values.api.envFromSecret }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          env:
            {{- /* NODE_NAME from Downward API is used to pin kaniko Jobs to the same node, so the RWO server-data PVC can be shared. */}}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- include "mcp-platform.dbEnv" . | nindent 12 }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: server-data
              mountPath: /var/lib/mcp-platform/servers
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- with .Values.api.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.api.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: {{ include "mcp-platform.api.fullname" . }}-server-data
      {{- with .Values.api.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
