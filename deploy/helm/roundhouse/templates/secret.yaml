{{- /*
Holds Laravel APP_KEY, the admin bootstrap creds, and (when postgres.enabled)
the DB password. APP_KEY auto-generates on first install and is read back
from the live Secret on upgrade so re-renders don't invalidate it.
*/ -}}
{{- $secretName := include "roundhouse.fullname" . -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $appKey := "" -}}
{{- if and $existing $existing.data $existing.data.APP_KEY -}}
{{- $appKey = $existing.data.APP_KEY | b64dec -}}
{{- else -}}
{{- $appKey = printf "base64:%s" (randAlphaNum 32 | b64enc) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "roundhouse.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  APP_KEY: {{ $appKey | quote }}
  ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  ADMIN_PASSWORD: {{ .Values.admin.password | quote }}
{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "roundhouse.fullname" . }}-db
  labels:
    {{- include "roundhouse.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.auth.password | quote }}
{{- end }}
