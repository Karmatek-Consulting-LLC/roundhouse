{{- if .Values.traefik.enabled -}}
{{- /*
  All traffic lands on the platform-api Service. The api image is multi-stage:
  FastAPI serves /api/* via its routers and the React SPA (static assets, with
  index.html fallback) for everything else from /app/public/frontend. This is
  the same single-image topology the Swarm stack (docker-stack.yml) uses — no
  separate frontend Service.
*/ -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "roundhouse.fullname" . }}
  labels:
    {{- include "roundhouse.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- range (splitList "," .Values.traefik.entrypoints) }}
    - {{ . | trim | quote }}
    {{- end }}
  routes:
    - kind: Rule
      match: {{ if .Values.traefik.hostname -}}
        Host(`{{ .Values.traefik.hostname }}`)
      {{- else -}}
        PathPrefix(`/`)
      {{- end }}
      # Lowest priority: this is the catch-all for the platform itself. Every
      # spawned MCP server's IngressRoute uses a default (rule-length) priority
      # well above 1, so PathPrefix(`/s/<name>`) always wins over this route —
      # without this explicit priority a long Host() rule would outrank them and
      # swallow MCP traffic.
      priority: 1
      services:
        - name: {{ include "roundhouse.api.fullname" . }}
          port: 8000
  {{- if .Values.traefik.tls.enabled }}
  tls:
    secretName: {{ .Values.traefik.tls.secretName | quote }}
  {{- end }}
{{- end }}
