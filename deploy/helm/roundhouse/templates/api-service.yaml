apiVersion: v1
kind: Service
metadata:
  name: {{ include "roundhouse.api.fullname" . }}
  labels:
    {{- include "roundhouse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "roundhouse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
