# Docker Swarm stack: Langflow + PostgreSQL
#
# Deploy (set env in your shell; Swarm does not auto-read .env):
#   export LANGFLOW_DB_PASSWORD='...' LANGFLOW_SUPERUSER_PASSWORD='...'
#   docker stack deploy -c docker-stack.langflow.yml langflow
#   # If needed, create/update config from local file:
#   # docker config create langflow_proxy_root_ca certs/proxy/proxy-root-ca.pem
#
# Defaults are for local / lab clusters only — use strong secrets in production.
#
# Notes:
# - `depends_on` is ignored by Swarm; Postgres has a healthcheck; Langflow should retry DB on boot.
# - Default is **1 Langflow replica**: MCP server JSON and other files under LANGFLOW_CONFIG_DIR are
#   local to each task; 2+ replicas cause missing-file / delete races unless you use a **shared**
#   volume (e.g. NFS) for that directory. Scale with `LANGFLOW_REPLICAS` when you have shared storage.
# - `LANGFLOW_EVENT_DELIVERY=direct` helps multi-replica builds once file storage is sorted.
# - Postgres uses a named volume (local driver): keep replicas: 1 unless you use an external DB.
# - Env vars use LANGFLOW_* prefixes so they do not collide with another app’s POSTGRES_*.
#
# TLS (lab proxy / corporate CA / “self-signed certificate in certificate chain”):
# - This stack mounts `certs/proxy/proxy-root-ca.pem` into Langflow via Swarm configs and sets:
#     SSL_CERT_FILE=/run/configs/langflow-proxy-root-ca.pem
#     REQUESTS_CA_BUNDLE=/run/configs/langflow-proxy-root-ca.pem
#   (httpx honors SSL_CERT_FILE; some code paths still use `requests`.)
# - Alternatively bake `update-ca-certificates` in a small image FROM langflowai/langflow.
#
# CORS warning in logs: set LANGFLOW_CORS_ORIGINS for production (see Langflow env docs).

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - langflow
    environment:
      POSTGRES_USER: ${LANGFLOW_DB_USER:-langflow}
      POSTGRES_PASSWORD: ${LANGFLOW_DB_PASSWORD:-changeme}
      POSTGRES_DB: ${LANGFLOW_DB_NAME:-langflow}
    volumes:
      - langflow_pgdata:/var/lib/postgresql/data
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.db == true
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  langflow:
    image: ${LANGFLOW_IMAGE:-langflowai/langflow:latest}
    networks:
      - langflow
    configs:
      - source: langflow_proxy_root_ca
        target: /run/configs/langflow-proxy-root-ca.pem
    environment:
      LANGFLOW_HOST: 0.0.0.0
      LANGFLOW_PORT: "7860"
      PORT: "7860"
      LANGFLOW_EVENT_DELIVERY: ${LANGFLOW_EVENT_DELIVERY:-direct}
      LANGFLOW_DATABASE_URL: postgresql://${LANGFLOW_DB_USER:-langflow}:${LANGFLOW_DB_PASSWORD:-changeme}@postgres:5432/${LANGFLOW_DB_NAME:-langflow}
      LANGFLOW_ENABLE_AUTH: ${LANGFLOW_ENABLE_AUTH:-true}
      LANGFLOW_SUPERUSER: ${LANGFLOW_SUPERUSER:-admin}
      LANGFLOW_SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD:-changeme}
      SSL_CERT_FILE: /run/configs/langflow-proxy-root-ca.pem
      REQUESTS_CA_BUNDLE: /run/configs/langflow-proxy-root-ca.pem
    ports:
      - target: 7860
        published: ${LANGFLOW_PUBLISHED_PORT:-7860}
        protocol: tcp
        mode: ingress
    deploy:
      mode: replicated
      replicas: ${LANGFLOW_REPLICAS:-1}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 512M
    # No LANGFLOW_CONFIG_DIR volume: durable data is in Postgres; add shared storage only if needed.

networks:
  langflow:
    driver: overlay
    attachable: true

volumes:
  langflow_pgdata:

configs:
  langflow_proxy_root_ca:
    file: ./certs/proxy/proxy-root-ca.pem
